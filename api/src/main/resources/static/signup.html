<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mathshort - 회원가입</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body class="authPage">
  <main class="authWrap">
    <section class="authCard" aria-label="Signup">
      <header class="authHeader">
        <div class="authBrandRow">
          <span class="authLogo" aria-hidden="true"></span>
          <span class="authBrandText">Mathshort</span>
        </div>
        <div class="authTopLink">
          이미 계정이 있나요? <a href="/login">로그인</a>
        </div>
      </header>

      <a class="authBtn authBtnGoogle" href="/oauth2/authorization/google">
        <span class="gIcon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.6 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.4 14.6 2.5 12 2.5 6.8 2.5 2.5 6.8 2.5 12S6.8 21.5 12 21.5c6.9 0 9.1-4.8 9.1-7.3 0-.5-.1-.9-.1-1.3H12z"/>
            <path fill="#34A853" d="M2.5 12c0 1.7.5 3.3 1.4 4.6l3.2-2.5c-.3-.6-.6-1.3-.6-2.1s.2-1.5.6-2.1L3.9 7.4A9.4 9.4 0 0 0 2.5 12z"/>
            <path fill="#FBBC05" d="M12 21.5c2.5 0 4.6-.8 6.1-2.2l-3-2.4c-.8.6-1.8 1-3.1 1-2.4 0-4.4-1.6-5.1-3.8l-3.2 2.5A9.5 9.5 0 0 0 12 21.5z"/>
            <path fill="#4285F4" d="M21.1 12.2c0-.7-.1-1.2-.2-1.8H12v3.9h5.5c-.2 1.1-.9 2.1-2 2.8l3 2.4c1.8-1.7 2.6-4.1 2.6-7.3z"/>
          </svg>
        </span>
        Google로 가입하기
      </a>

      <div class="authDivider"><span>또는</span></div>

      <a class="authBtn authBtnEmail" href="/signup/email">
        <span aria-hidden="true">✉️</span>
        Email로 가입하기
      </a>

      <p class="authTerms">
        회원가입 시
        <a href="/terms">이용약관</a> 및
        <a href="/privacy">개인정보 보호정책</a>에 동의한 것으로 간주합니다.
      </p>
    </section>
  </main>
</body>
</html>
