<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    body { margin:0; width:1080px; height:1920px; overflow:hidden; background:#0b1220; }
    .frame {
      width:1080px; height:1920px;
      position:relative;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo","Noto Sans KR", sans-serif;
      color: rgba(255,255,255,.92);
      background:
        radial-gradient(900px 600px at 20% 10%, rgba(124,58,237,.30), transparent 55%),
        radial-gradient(800px 520px at 80% 0%, rgba(34,197,94,.18), transparent 55%),
        radial-gradient(900px 700px at 40% 90%, rgba(59,130,246,.14), transparent 60%),
        #0b1220;
    }
    .header {
      position:absolute; left:48px; top:44px; right:48px;
      display:flex; justify-content:space-between; align-items:center;
    }
    .brand { font-weight:800; font-size:34px; letter-spacing:.2px; opacity:.92; }
    .badge { font-size:22px; padding:10px 14px; border-radius:999px;
      border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); color:rgba(255,255,255,.75);
    }
    .content { position:absolute; left:48px; right:48px; top:130px; bottom:70px; display:grid; grid-template-columns: 1.15fr .85fr; gap:20px;}
    .card { border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.05); border-radius:22px; padding:22px; }
    .problemImgWrap { position:relative; border-radius:18px; overflow:hidden; border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.18); }
    .problemImg { width:100%; display:block; }
    .overlaySvg { position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none; }
    .title { font-size:30px; font-weight:800; margin: 0 0 10px; }
    .desc { font-size:24px; line-height:1.45; color:rgba(255,255,255,.86); white-space:pre-wrap; }
    .formula { margin-top:14px; padding:16px 16px; border-radius:18px;
      border:1px solid rgba(124,58,237,.22); background: rgba(124,58,237,.12);
      font-size:30px;
    }
    .sideTitle { font-size:24px; font-weight:800; margin: 0 0 10px; color:rgba(255,255,255,.85); }
    .sideBox { border:1px solid rgba(34,197,94,.20); background: rgba(34,197,94,.10); border-radius:18px; padding:16px; }
    .small { font-size:22px; color:rgba(255,255,255,.84); line-height:1.45; white-space:pre-wrap;}
    .footer { position:absolute; left:48px; right:48px; bottom:28px; display:flex; justify-content:space-between; color:rgba(255,255,255,.55); font-size:18px; }
  </style>

  <!-- MathJax -->
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)']], displayMath: [['$$','$$']] } };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>

<body>
  <div class="frame">
    <div class="header">
      <div class="brand">mathshort</div>
      <div class="badge">{{badge}}</div>
    </div>

    <div class="content">
      <div class="card">
        <div class="problemImgWrap">
          <img class="problemImg" src="file://{{problem_image_path}}" />
          <!-- SVG overlay -->
          <svg class="overlaySvg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            {{svg_overlay}}
          </svg>
        </div>
      </div>

      <div class="card">
        <div class="title">{{title}}</div>
        <div class="desc">{{desc}}</div>
        <div class="formula">{{formula_html}}</div>

        <div style="margin-top:16px;">
          <div class="sideTitle">공식/체크포인트</div>
          <div class="sideBox">
            <div class="small">{{side_note}}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div>{{footer_left}}</div>
      <div>{{footer_right}}</div>
    </div>
  </div>
</body>
</html>
